<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OPTIMUM Student Dashboard" />
    <title>Student Dashboard • OPTIMUM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="web-app-manifest-192x192.png" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" id="top">
      <div class="topband" aria-label="Quick contact">
        <div class="container topband-inner">
          <div class="topband-card" role="group" aria-label="Call 8910801901 or 9674817581">
            <span class="topband-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 16.5v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 3.57 12.8 19.8 19.8 0 0 1 .5 4.18 2 2 0 0 1 2.49 2h3a2 2 0 0 1 2 1.72c.13.98.38 1.93.73 2.83a2 2 0 0 1-.45 2.11L6.5 10.5a16 16 0 0 0 7 7l1.84-1.28a2 2 0 0 1 2.11-.45c.9.35 1.85.6 2.83.73A2 2 0 0 1 21 16.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="topband-inline">Call : <a href="tel:8910801901" aria-label="Call 8910801901"><strong>8910801901</strong></a> / <a href="tel:9674817581" aria-label="Call 9674817581"><strong>9674817581</strong></a></span>
          </div>
        </div>
      </div>

      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="OPTIMUM Education Centre">
          <img class="brand-logo" src="assets/logo.png" alt="OPTIMUM logo" />
          <div class="brand-text">
            <span class="brand-name">OPTIMUM</span>
            <span class="brand-sub">Education Centre</span>
          </div>
        </a>

        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="#" class="btn btn-ghost" id="studentBackBtn">Back</a>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="section">
        <div class="container">
          <div class="student-shell" id="studentShell">
            <aside class="student-sidebar" aria-label="Dashboard navigation">
              <div class="student-sidebar-head">
                <div class="student-sidebar-title">Student Dashboard</div>
                <div class="student-sidebar-sub">Choose a section</div>
              </div>

              <div class="student-tabs" role="tablist" aria-label="Dashboard sections">
                <button class="student-tab active" type="button" role="tab" aria-selected="true" data-view="lectures">Recorded Lectures</button>
                <button class="student-tab" type="button" role="tab" aria-selected="false" data-view="materials">Study Materials</button>
                <button class="student-tab" type="button" role="tab" aria-selected="false" data-view="yearspapers">Year's Papers</button>
                <button class="student-tab" type="button" role="tab" aria-selected="false" data-view="chaptersolutions">Chapters Solution</button>
              </div>
            </aside>

            <section class="student-main" aria-label="Dashboard content">
              <div class="student-toolbar">
                <div class="student-filters" aria-label="Filters">
                  <label>
                    <span>Class</span>
                    <select id="studentClass" aria-label="Class"></select>
                  </label>
                  <label>
                    <span>Section</span>
                    <select id="studentSection" aria-label="Section"></select>
                  </label>
                  <label>
                    <span>Subject</span>
                    <select id="studentSubject" aria-label="Subject"></select>
                  </label>
                </div>
                <div class="student-actions">
                  <button class="btn btn-ghost" type="button" id="studentRefresh">Refresh</button>
                </div>
              </div>

              <div class="student-status" id="studentStatus" role="status" aria-live="polite"></div>

              <div class="student-list" id="studentList" aria-label="Items"></div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
