service: demo-backend
useDotenv: true
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors:
      allowedOrigins:
        - http://127.0.0.1:5500
        - http://localhost:5500
        - https://sahibalam.github.io
        - https://upscholarapp.com
        - https://www.upscholarapp.com
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Requested-With
        - Accept
        - Origin
        - Content-Range
        - Content-Length
        - X-Upload-URL
        - X-Upload-Content-Type
        - X-Upload-Content-Length
      allowedMethods:
        - OPTIONS
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      maxAge: 86400
  environment:
    MONGODB_URI: ${env:MONGODB_URI}
    ADMIN_USER: ${env:ADMIN_USER}
    ADMIN_PASS: ${env:ADMIN_PASS}
    CLIENT_ID: ${env:CLIENT_ID}
    CLIENT_SECRET: ${env:CLIENT_SECRET}
    REFRESH_TOKEN: ${env:REFRESH_TOKEN}
    REDIRECT_URI: ${env:REDIRECT_URI}
    APP_PASSWORD: ${env:APP_PASSWORD}
    ADMISSION_EMAIL: ${env:ADMISSION_EMAIL, 'botclap.crm@gmail.com'}

functions:
  lecturesPublic:
    handler: src/handlers/lecturesPublic.handler
    timeout: 15
    events:
      - httpApi:
          path: /lectures
          method: GET

  admission:
    handler: src/handlers/admission.handler
    timeout: 30
    events:
      - httpApi:
          path: /admission
          method: POST

  admissionOptionsPublic:
    handler: src/handlers/admissionOptionsPublic.handler
    timeout: 15
    events:
      - httpApi:
          path: /admission/options
          method: GET

  leads:
    handler: src/handlers/leads.handler
    timeout: 15
    events:
      - httpApi:
          path: /leads
          method: POST

  contact:
    handler: src/handlers/contact.handler
    timeout: 15
    events:
      - httpApi:
          path: /contact
          method: POST

  lecturesAdmin:
    handler: src/handlers/lecturesAdmin.handler
    timeout: 15
    events:
      - httpApi:
          path: /admin/lectures
          method: GET
      - httpApi:
          path: /admin/lectures
          method: POST
      - httpApi:
          path: /admin/lectures/{id}
          method: PUT
      - httpApi:
          path: /admin/lectures/{id}
          method: DELETE

  materialsPublic:
    handler: src/handlers/materialsPublic.handler
    timeout: 15
    events:
      - httpApi:
          path: /materials
          method: GET

  announcementsPublic:
    handler: src/handlers/announcementsPublic.handler
    timeout: 15
    events:
      - httpApi:
          path: /announcements
          method: GET

  materialsAdmin:
    handler: src/handlers/materialsAdmin.handler
    timeout: 30
    events:
      - httpApi:
          path: /admin/materials
          method: GET
      - httpApi:
          path: /admin/materials
          method: POST
      - httpApi:
          path: /admin/materials/{id}
          method: DELETE

  materialsResumableStart:
    handler: src/handlers/materialsResumableStart.handler
    timeout: 15
    events:
      - httpApi:
          path: /admin/materials/resumable/start
          method: POST

  materialsResumableFinalize:
    handler: src/handlers/materialsResumableFinalize.handler
    timeout: 30
    events:
      - httpApi:
          path: /admin/materials/resumable/finalize
          method: POST

  materialsResumableChunk:
    handler: src/handlers/materialsResumableChunk.handler
    timeout: 30
    events:
      - httpApi:
          path: /admin/materials/resumable/chunk
          method: PUT

  announcementsAdmin:
    handler: src/handlers/announcementsAdmin.handler
    timeout: 15
    events:
      - httpApi:
          path: /admin/announcements
          method: GET
      - httpApi:
          path: /admin/announcements
          method: POST
      - httpApi:
          path: /admin/announcements/{id}
          method: DELETE

  timetablesPublic:
    handler: src/handlers/timetablesPublic.handler
    timeout: 15
    events:
      - httpApi:
          path: /timetables
          method: GET

  timetablesAdmin:
    handler: src/handlers/timetablesAdmin.handler
    timeout: 30
    events:
      - httpApi:
          path: /admin/timetables
          method: GET
      - httpApi:
          path: /admin/timetables
          method: POST
      - httpApi:
          path: /admin/timetables/{id}
          method: DELETE

  timetablesResumableStart:
    handler: src/handlers/timetablesResumableStart.handler
    timeout: 15
    events:
      - httpApi:
          path: /admin/timetables/resumable/start
          method: POST

  timetablesResumableFinalize:
    handler: src/handlers/timetablesResumableFinalize.handler
    timeout: 30
    events:
      - httpApi:
          path: /admin/timetables/resumable/finalize
          method: POST

  timetablesResumableChunk:
    handler: src/handlers/timetablesResumableChunk.handler
    timeout: 30
    events:
      - httpApi:
          path: /admin/timetables/resumable/chunk
          method: PUT

  classesAdmin:
    handler: src/handlers/classesAdmin.handler
    timeout: 15
    events:
      - httpApi:
          path: /admin/classes
          method: GET
      - httpApi:
          path: /admin/classes
          method: POST
      - httpApi:
          path: /admin/classes/{id}
          method: DELETE

  sessionsAdmin:
    handler: src/handlers/sessionsAdmin.handler
    timeout: 15
    events:
      - httpApi:
          path: /admin/sessions
          method: GET
      - httpApi:
          path: /admin/sessions
          method: POST
      - httpApi:
          path: /admin/sessions/{id}
          method: DELETE

  studentsAdmin:
    handler: src/handlers/studentsAdmin.handler
    timeout: 15
    events:
      - httpApi:
          path: /admin/students
          method: GET
      - httpApi:
          path: /admin/students/{id}
          method: PATCH
      - httpApi:
          path: /admin/students/{id}
          method: DELETE

plugins:
  - serverless-dotenv-plugin
  - serverless-offline
