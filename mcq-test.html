<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DEMO MCQ Test" />
    <title>MCQ Test • DEMO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="web-app-manifest-192x192.png" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" id="top">
      <div class="topband" aria-label="Quick contact">
        <div class="container topband-inner">
          <div class="topband-card" role="group" aria-label="Call 9875386318">
            <span class="topband-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 16.5v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 3.57 12.8 19.8 19.8 0 0 1 .5 4.18 2 2 0 0 1 2.49 2h3a2 2 0 0 1 2 1.72c.13.98.38 1.93.73 2.83a2 2 0 0 1-.45 2.11L6.5 10.5a16 16 0 0 0 7 7l1.84-1.28a2 2 0 0 1 2.11-.45c.9.35 1.85.6 2.83.73A2 2 0 0 1 21 16.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span class="topband-inline">Call : <a href="tel:9875386318" aria-label="Call 9875386318"><strong>9875386318</strong></a></span>
          </div>
        </div>
      </div>

      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="DEMO INSTITUTE">
          <img class="brand-logo" src="assets/logo.png" alt="DEMO logo" />
          <div class="brand-text">
            <span class="brand-name">DEMO</span>
            <span class="brand-sub">INSTITUTE</span>
          </div>
        </a>

        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="student.html" class="btn btn-ghost">Dashboard</a>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="section">
        <div class="container" style="max-width: 980px">
          <div class="section-head">
            <h2>MCQ <span class="offerings-accent">Test</span></h2>
            <p>Select class/section/subject, start the test, and view your score.</p>
          </div>

          <div class="card" style="margin-bottom: 14px">
            <form class="form" id="mcqConfigForm" style="padding: 0; max-width: 900px">
              <div style="display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px">
                <label>
                  <span>Class</span>
                  <input id="mcqClass" placeholder="10" />
                </label>
                <label>
                  <span>Section</span>
                  <input id="mcqSection" placeholder="Science" />
                </label>
                <label>
                  <span>Subject</span>
                  <input id="mcqSubject" placeholder="Math" />
                </label>
              </div>

              <div style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 10px">
                <label>
                  <span>Chapter (optional)</span>
                  <input id="mcqChapter" placeholder="Chapter 1" />
                </label>
                <div style="display: flex; gap: 10px; align-items: end; justify-content: flex-end">
                  <button class="btn btn-primary" id="mcqStartBtn" type="button">Start Test</button>
                  <button class="btn btn-ghost" id="mcqReloadBtn" type="button">Reload Questions</button>
                </div>
              </div>

              <p class="form-note" id="mcqConfigNote" role="status" aria-live="polite"></p>
            </form>
          </div>

          <div class="card" id="mcqTestCard" hidden>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap">
              <div>
                <div style="font-weight: 1000">Progress</div>
                <div class="muted" style="font-size: 12px" id="mcqProgress">0 / 0</div>
              </div>
              <div>
                <div style="font-weight: 1000">Score</div>
                <div class="muted" style="font-size: 12px" id="mcqScore">0</div>
              </div>
            </div>

            <div style="margin-top: 12px">
              <div class="muted" style="font-size: 12px; margin-bottom: 8px">Question</div>
              <div id="mcqQuestionBox" class="card" style="padding: 12px"></div>
            </div>

            <div style="display: grid; gap: 10px; margin-top: 12px" id="mcqOptions"></div>

            <div style="display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap">
              <button class="btn btn-ghost" id="mcqPrevBtn" type="button">Prev</button>
              <button class="btn btn-primary" id="mcqNextBtn" type="button">Next</button>
              <button class="btn btn-ghost" id="mcqFinishBtn" type="button">Finish</button>
            </div>

            <p class="form-note" id="mcqTestNote" role="status" aria-live="polite"></p>
          </div>

          <div class="card" id="mcqResultCard" hidden>
            <h3 style="margin-top: 0">Result</h3>
            <div class="muted" id="mcqResultSummary"></div>
            <div style="display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap">
              <button class="btn btn-primary" id="mcqRetakeBtn" type="button">Retake</button>
              <a class="btn btn-ghost" href="student.html">Go to Dashboard</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const qs = (s, el = document) => el.querySelector(s);

      const API_BASE = 'https://s2pdc00yoa.execute-api.ap-south-1.amazonaws.com';

      function getParams() {
        try {
          return new URLSearchParams(window.location.search || '');
        } catch {
          return new URLSearchParams();
        }
      }

      function escapeHtml(s) {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function setNote(id, msg) {
        const el = qs(id);
        if (el) el.textContent = msg || '';
      }

      let questions = [];
      let idx = 0;
      let answers = {}; // questionId -> selectedOption(1-4)
      let score = 0;

      async function loadQuestions() {
        const klass = String(qs('#mcqClass')?.value || '').trim();
        const section = String(qs('#mcqSection')?.value || '').trim();
        const subject = String(qs('#mcqSubject')?.value || '').trim();
        const chapter = String(qs('#mcqChapter')?.value || '').trim();

        const url = new URL(API_BASE + '/questions');
        if (klass) url.searchParams.set('class', klass);
        if (section) url.searchParams.set('section', section);
        if (subject) url.searchParams.set('subject', subject);
        if (chapter) url.searchParams.set('chapter', chapter);

        setNote('#mcqConfigNote', 'Loading questions...');

        const r = await fetch(url.toString());
        if (!r.ok) {
          const t = await r.text();
          setNote('#mcqConfigNote', `Failed: ${r.status} ${t}`);
          questions = [];
          return;
        }

        const data = await r.json();
        questions = Array.isArray(data?.items) ? data.items : [];
        setNote('#mcqConfigNote', questions.length ? `Loaded ${questions.length} question(s).` : 'No questions found for these filters.');
      }

      function renderQuestion() {
        const q = questions[idx];
        if (!q) return;

        const progress = qs('#mcqProgress');
        if (progress) progress.textContent = `${idx + 1} / ${questions.length}`;

        const box = qs('#mcqQuestionBox');
        if (box) box.innerHTML = q.questionHtml || '';

        const opts = qs('#mcqOptions');
        if (!opts) return;
        opts.innerHTML = '';

        const selected = answers[q.id] || 0;

        (Array.isArray(q.optionsHtml) ? q.optionsHtml : []).slice(0, 4).forEach((html, i) => {
          const n = i + 1;
          const row = document.createElement('label');
          row.className = 'card';
          row.style.padding = '10px 12px';
          row.style.display = 'grid';
          row.style.gridTemplateColumns = '20px 1fr';
          row.style.gap = '10px';
          row.style.alignItems = 'start';
          row.innerHTML = `
            <input type="radio" name="mcqOpt" value="${n}" ${selected === n ? 'checked' : ''} style="margin-top:4px" />
            <div>${html || ''}</div>
          `;
          row.addEventListener('change', () => {
            answers[q.id] = n;
          });
          opts.appendChild(row);
        });

        setNote('#mcqTestNote', '');
      }

      function computeScore() {
        // We do not expose correct answers in public endpoint.
        // For now, score can be computed only if backend returns correctness.
        // So we show attempt summary only.
        return 0;
      }

      function showTest() {
        qs('#mcqTestCard').hidden = false;
        qs('#mcqResultCard').hidden = true;
        renderQuestion();
      }

      function showResult() {
        qs('#mcqTestCard').hidden = true;
        qs('#mcqResultCard').hidden = false;

        const attempted = Object.keys(answers).length;
        const total = questions.length;
        const summary = qs('#mcqResultSummary');
        if (summary) {
          summary.textContent = `Attempted ${attempted} of ${total} question(s). Score evaluation can be enabled by returning correct answers from backend.`;
        }
      }

      function seedFromQuery() {
        const p = getParams();
        const klass = p.get('class') || '';
        const section = p.get('section') || '';
        const subject = p.get('subject') || '';
        const chapter = p.get('chapter') || '';

        const classEl = qs('#mcqClass');
        const secEl = qs('#mcqSection');
        const subEl = qs('#mcqSubject');
        const chEl = qs('#mcqChapter');

        if (classEl && klass) classEl.value = klass;
        if (secEl && section) secEl.value = section;
        if (subEl && subject) subEl.value = subject;
        if (chEl && chapter) chEl.value = chapter;
      }

      async function init() {
        seedFromQuery();
        await loadQuestions();

        qs('#mcqReloadBtn').addEventListener('click', loadQuestions);

        qs('#mcqStartBtn').addEventListener('click', async () => {
          if (!questions.length) {
            await loadQuestions();
          }
          if (!questions.length) return;
          answers = {};
          idx = 0;
          score = 0;
          qs('#mcqScore').textContent = String(score);
          showTest();
        });

        qs('#mcqPrevBtn').addEventListener('click', () => {
          if (idx <= 0) return;
          idx -= 1;
          renderQuestion();
        });

        qs('#mcqNextBtn').addEventListener('click', () => {
          if (idx >= questions.length - 1) return;
          idx += 1;
          renderQuestion();
        });

        qs('#mcqFinishBtn').addEventListener('click', () => {
          showResult();
        });

        qs('#mcqRetakeBtn').addEventListener('click', () => {
          qs('#mcqResultCard').hidden = true;
          qs('#mcqTestCard').hidden = true;
          setNote('#mcqConfigNote', '');
        });
      }

      init();
    </script>
  </body>
</html>
